workflows:
  android-release:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      vars:
        DASHSCOPE_API_KEY: Encrypted(Z0FBQUFBQnB5SW9aSW9vQ0pnYVpXNG9nRnlURnBWSE5lNzVoZU1QUGQ0TTVhT1ZDT1ZTUXBmVEU3QURiVHRIcTdLTzBlNFlRZEZLTlJCTUVVNWJLVHFWRkVHMFZvam5qVHFldFJXV3pXb0JLM0YwRzFMc3YzR2JSelI2M001RnpBRmdZNnFMY2FoTFY=)
    scripts:
      - name: Generate platform shells
        script: |
          flutter create --platforms android .
      - name: Ensure INTERNET permission for release
        script: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 -c "
          p='$MANIFEST'
          t=open(p).read()
          if 'android.permission.INTERNET' not in t:
              t=t.replace('</manifest>','    <uses-permission android:name=\"android.permission.INTERNET\"/>\n</manifest>')
              open(p,'w').write(t)
              print('INJECTED INTERNET permission')
          else:
              print('INTERNET permission already present')
          "
          echo "--- AndroidManifest.xml ---"
          cat "$MANIFEST"
      - name: Create .env file
        script: |
          echo "DASHSCOPE_API_KEY=$DASHSCOPE_API_KEY" > .env
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - dukiian@outlook.com
        notify:
          success: true
          failure: true
