workflows:
  android-release:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - app_secrets
    scripts:
      - name: Generate platform shells
        script: |
          flutter create --platforms android .
      - name: Create .env file
        script: |
          echo "DASHSCOPE_API_KEY=\$DASHSCOPE_API_KEY" > .env
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - dukiian@outlook.com
        notify:
          success: true
          failure: true
